#!/bin/bash

# GNS3 configuration settings for Ansible tests

# GNS Project name, GNS3 server host IP address, managed by dashboard
GNS3_PROJECT_NAME=Ansible-test1
# GNS3_SERVER_HOST=192.168.1.150
GNS3_SERVER_HOST=192.168.229.128

GNS3_LAN_PORT="br0"
GNS3_LAN_PORT_NR="0"
GNS3_LAN_ADAPTER="0"

GNS3_SERVER_NETWORK_ADAPTER=1
GNS3_SERVER_PORT=3080
#GNS3_SERVER_DT_IMAGE_PATH=$HOME/GNS3/images/QEMU
# GNS3_SERVER_DT_IMAGE_PATH=$ANSIBLE/test/gns3_images
GNS3_SERVER_DT_IMAGE_PATH=$ANSIBLE/tests/integration/harness/gns3_images

# XiQ Emulator server IP address
#XIQEMU_HOST="192.168.1.121"

# Subnet routing configuration for the test network
# SUBNET_ROUTER_GATEWAY: The IP address of the subnet router (gateway)
# SUBNET_ROUTER_NETWORK: The network to route through the gateway
# Set these to match your GNS3 network environment
# SUBNET_ROUTER_GATEWAY="192.168.1.252"
# SUBNET_ROUTER_NETWORK="192.168.5.0/24"
# For local GNS3 on 192.168.229.x network, routing may not be needed
SUBNET_ROUTER_GATEWAY="192.168.229.252"
SUBNET_ROUTER_NETWORK="192.168.5.0/24"

# source ${ANSIBLE}/test/tools/gns3_func
source ${ANSIBLE}/tests/integration/harness/tools/gns3_func

#############################################################
# Path to where the DT images are stored
# 
# mages must be names: voss-dt-<n>.qcow2
#  Where <n> is the DT instance number
DT_IMAGE_PATH=$GNS3_SERVER_DT_IMAGE_PATH

