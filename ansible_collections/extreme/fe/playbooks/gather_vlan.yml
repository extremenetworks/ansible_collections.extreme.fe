---
- hosts: fe_dt_1
  gather_facts: false
  vars:
    gather_list: [5, 6, 7, 8, 9, 10]
  tasks:
    - name: Gather VLAN details
      extreme.fe.extreme_fe_vlans:
        state: gathered
        gather_filter: "{{ gather_list }}"
      register: vlan_info

    - debug:
        var: vlan_info.vlans
