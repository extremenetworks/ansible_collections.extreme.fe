name: Pre-Publish Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint yamllint

      - name: Yaml Lint (including galaxy.yml)
        run: |
          yamllint -c ansible_collections/extreme/fe/.yamllint.yml -f standard ansible_collections/extreme/fe
          yamllint -c ansible_collections/extreme/fe/.yamllint.yml -f standard ansible_collections/extreme/fe/galaxy.yml

      - name: Ansible Lint
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}
        run: |
          cd ansible_collections/extreme/fe && ansible-lint || (echo "ansible-lint failed" && exit 1)

      - name: Validate GitHub Actions workflow syntax
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error

      - name: Dry build check (structure validation)
        run: |
          ansible-galaxy collection build ansible_collections/extreme/fe --output-path dist/
          test -f dist/*.tar.gz || (echo "Build artifact missing" && exit 1)
