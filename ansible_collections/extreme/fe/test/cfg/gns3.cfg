#!/bin/bash

# GNS3 configuration settings for Ansible tests

# GNS Project name, GNS3 server host IP address, managed by dashboard
GNS3_PROJECT_NAME=Ansible-test
GNS3_SERVER_HOST=192.168.1.150

GNS3_LAN_PORT="br0"
GNS3_LAN_PORT_NR="0"
GNS3_LAN_ADAPTER="0"

GNS3_SERVER_NETWORK_ADAPTER=1
GNS3_SERVER_PORT=3080
#GNS3_SERVER_DT_IMAGE_PATH=$HOME/GNS3/images/QEMU
GNS3_SERVER_DT_IMAGE_PATH=$ANSIBLE/test/gns3_images

# XiQ Emulator server IP address
#XIQEMU_HOST="192.168.1.121"

source ${ANSIBLE}/test/tools/gns3_func

#############################################################
# Path to where the DT images are stored
# 
# mages must be names: voss-dt-<n>.qcow2
#  Where <n> is the DT instance number
DT_IMAGE_PATH=$GNS3_SERVER_DT_IMAGE_PATH

