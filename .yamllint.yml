---
extends: default

rules:
  line-length:
    max: 160
    level: warning
  truthy:
    allowed-values: ["true", "false", "yes", "no"]
  comments:
    min-spaces-from-content: 1
  document-start: enable
  indentation:
    spaces: 2
    indent-sequences: consistent

ignore: |
  venv/
  .venv/
  .git/
  *.tar.gz
