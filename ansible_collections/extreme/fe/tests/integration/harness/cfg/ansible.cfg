[defaults]
inventory = inventory.ini
collections_path = ../../../../../ansible_collections
host_key_checking = False
connection_facts_modules = {"extreme.fe.extreme_fe": ".extreme.fe.extreme_fe_facts"}
facts_modules = smart, extreme.fe.extreme_fe_facts

# Enable callbacks
stdout_callback = ansible.builtin.default          
bin_ansible_callbacks = True

# For structured logging
callback_enabled = json,log_plays

[persistent_connection]
connect_timeout = 30
command_timeout = 60

[callback_default]
result_format = yaml
