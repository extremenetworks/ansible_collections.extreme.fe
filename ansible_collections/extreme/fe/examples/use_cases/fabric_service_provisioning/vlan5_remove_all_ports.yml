---
- name: Remove ports 1:5-1:10 from VLAN 5
  hosts: gns3_network
  gather_facts: false
  vars:
    target_ports:
      - PORT:1:5
      - PORT:1:6
      - PORT:1:7
      - PORT:1:8
      - PORT:1:9
      - PORT:1:10
  tasks:
    - name: Ensure VLAN 5 exists
      extreme.fe.extreme_fe_vlans:
        vlan_id: 5
        vr_name: GlobalRouter
        state: merged

    - name: Remove VLAN 5 membership from interfaces
      extreme.fe.extreme_fe_l2_interfaces:
        interface: "{{ interface }}"
        remove_tagged_vlans: [5]
        untagged_vlan: 5
        state: deleted
      loop: "{{ target_ports }}"
      loop_control:
        loop_var: interface
