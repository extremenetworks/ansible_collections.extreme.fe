[gns3_network]
fe_dt_1 ansible_host=192.168.SUBNET.101
fe_dt_2 ansible_host=192.168.SUBNET.102
fe_dt_4 ansible_host=192.168.SUBNET.104
fe_dt_5 ansible_host=192.168.SUBNET.105

[gns3_network:vars]
ansible_connection=httpapi
ansible_network_os=extreme.fe.extreme_fe
ansible_httpapi_use_ssl=true
ansible_httpapi_validate_certs=false
ansible_httpapi_port=9443
ansible_httpapi_base_path=/rest/openapi
ansible_user=rwa
ansible_password=rwa

# Single dt (dt-1)
[fe_dt_1_hosts]
fe_dt_1 ansible_host=192.168.SUBNET.101

# Single dt (dt-2)
[fe_dt_2_hosts]
fe_dt_2 ansible_host=192.168.SUBNET.102
# Single dt (dt-4)
[fe_dt_4_hosts]
fe_dt_4 ansible_host=192.168.SUBNET.104

# Single dt (dt-5)
[fe_dt_5_hosts]
fe_dt_5 ansible_host=192.168.SUBNET.105
# Upper hosts (dt-1 and dt-2)
[fe_dt_upper_hosts]
fe_dt_1 ansible_host=192.168.SUBNET.101
fe_dt_2 ansible_host=192.168.SUBNET.102
# Lower hosts (dt-4 and dt-5)
[fe_dt_lower_hosts]
fe_dt_4 ansible_host=192.168.SUBNET.104
fe_dt_5 ansible_host=192.168.SUBNET.105
