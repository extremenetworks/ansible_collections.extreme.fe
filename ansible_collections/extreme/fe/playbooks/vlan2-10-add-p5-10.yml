---
- name: Configure VLANs 5 and 6 on ports 1:5-1:9 (TRUNK)
  hosts: gns3_network
  gather_facts: false
  vars:
    target_vlans: [5, 6]
    target_ports:
      - PORT:1:5
      - PORT:1:6
      - PORT:1:7
      - PORT:1:8
      - PORT:1:9
  tasks:
    - name: Ensure VLAN exists
      extreme.fe.extreme_fe_vlans:
        vlan_id: "{{ vlan_id | int }}"
        vlan_name: "Campus-{{ vlan_id }}"
        vr_name: GlobalRouter
        state: merged
      loop: "{{ target_vlans }}"
      loop_control:
        loop_var: vlan_id
        label: "VLAN {{ vlan_id }}"

    - name: Ensure interfaces carry VLAN membership
      extreme.fe.extreme_fe_l2_interfaces:
        interface: "{{ interface }}"
        port_type: TRUNK
        tagged_vlans: "{{ target_vlans }}"
        untagged_vlan: 0
        state: replaced
      loop: "{{ target_ports }}"
      loop_control:
        loop_var: interface
        label: "Interface {{ interface }}"
