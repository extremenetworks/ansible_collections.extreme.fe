---
- name: Exercise Fabric Engine ping module
  hosts: fe_dt_lower_hosts
  gather_facts: false
  vars:
    ping_targets:
      primary_ipv4: 192.0.2.10
      secondary_ipv4: 198.51.100.10
      ipv6_host: 2001:db8:100::10
    ping_interfaces:
      gigabit: "1:10"
      vlan_id: 4050
      tunnel_id: 101
    ping_source_addresses:
      ipv4: &ping_ipv4_source 192.0.2.254
      ipv6: &ping_ipv6_source
        address: 2001:db8:ffff::254
        ipAddressType: IPv6
    ping_vrf: GlobalRouter

  tasks:
    - name: IPv4 ping from GlobalRouter VRF with explicit tuning
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.primary_ipv4 }}"
        host_type: IPv4
        count: 5
        datasize: 64
        transmission_interval: 1
        timeout_interval: 5
        vrf: "{{ ping_vrf }}"
      register: ping_vrf_result
      ignore_errors: true

    - name: IPv4 ping using gigabit interface as source
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.secondary_ipv4 }}"
        interface:
          type: GIGABITETHERNET
          port: "{{ ping_interfaces.gigabit }}"
        count: 3
      register: ping_interface_result
      ignore_errors: true

    - name: IPv4 ping sourced from a VLAN interface
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.primary_ipv4 }}"
        interface:
          type: VLAN
          vlan_id: "{{ ping_interfaces.vlan_id }}"
        datasize: 128
        timeout_interval: 6
      register: ping_vlan_result
      ignore_errors: true

    - name: IPv4 ping sourced from a tunnel
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.secondary_ipv4 }}"
        interface:
          type: TUNNEL
          tunnel_id: "{{ ping_interfaces.tunnel_id }}"
        transmission_interval: 2
      register: ping_tunnel_result
      ignore_errors: true

    - name: IPv4 ping using management VLAN context
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.primary_ipv4 }}"
        management_type: VLAN
        count: 2
        datasize: 56
      register: ping_mgmt_result
      ignore_errors: true

    - name: IPv4 ping with service probe instance
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.primary_ipv4 }}"
        service_probe_instance: 1
        count: 2
      register: ping_service_probe
      ignore_errors: true

    - name: IPv4 ping with string source address override
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.secondary_ipv4 }}"
        source_ip_address: *ping_ipv4_source
        timeout_interval: 4
      register: ping_source_ipv4
      ignore_errors: true

    - name: IPv6 ping with scoped source definition
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.ipv6_host }}"
        source_ip_address: *ping_ipv6_source
        scope_id: 5
        datasize: 512
        timeout_interval: 10
        transmission_interval: 2
      register: ping_ipv6_source
      ignore_errors: true

    - name: IPv6 ping using explicit host type and VRF
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.ipv6_host }}"
        host_type: IPv6
        vrf: "{{ ping_vrf }}"
        count: 3
        datasize: 1024
      register: ping_ipv6_vrf
      ignore_errors: true

    - name: Validate module parameter guard rails (expected failure)
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.primary_ipv4 }}"
        management_type: OOB
        interface:
          type: GIGABITETHERNET
          port: "{{ ping_interfaces.gigabit }}"
      register: ping_invalid_combo
      ignore_errors: true

    - name: Trigger invalid service probe instance error
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.primary_ipv4 }}"
        service_probe_instance: 2
      register: ping_invalid_probe
      ignore_errors: true

    - name: Trigger invalid scope id for IPv4 host
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.primary_ipv4 }}"
        scope_id: 5
      register: ping_invalid_scope
      ignore_errors: true

    - name: Trigger invalid count value
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.primary_ipv4 }}"
        count: 0
      register: ping_invalid_count
      ignore_errors: true

    - name: Trigger interface validation error
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.primary_ipv4 }}"
        interface:
          type: GIGABITETHERNET
        count: 1
      register: ping_invalid_interface
      ignore_errors: true

    - name: Trigger tunnel interface validation error
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.primary_ipv4 }}"
        interface:
          type: TUNNEL
        count: 1
      register: ping_invalid_tunnel
      ignore_errors: true

    - name: Trigger VLAN interface validation error
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.primary_ipv4 }}"
        interface:
          type: VLAN
        count: 1
      register: ping_invalid_vlan
      ignore_errors: true

    - name: Trigger invalid timeout interval
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.primary_ipv4 }}"
        timeout_interval: 200
      register: ping_invalid_timeout
      ignore_errors: true

    - name: Trigger invalid source IP dictionary
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.primary_ipv4 }}"
        source_ip_address:
          mask_length: 24
      register: ping_invalid_source_dict
      ignore_errors: true

    - name: Trigger invalid source IP type
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.primary_ipv4 }}"
        source_ip_address: ["192.0.2.1"]
      register: ping_invalid_source_type
      ignore_errors: true

    - name: Check-mode ping preview
      extreme.fe.extreme_fe_ping:
        host: "{{ ping_targets.primary_ipv4 }}"
      check_mode: true
      register: ping_check_mode
      ignore_errors: true

    - name: Summarise ping coverage results
      debug:
        msg:
          - "VRF run: {{ ping_vrf_result | default({}) }}"
          - "Interface run: {{ ping_interface_result | default({}) }}"
          - "VLAN run: {{ ping_vlan_result | default({}) }}"
          - "Tunnel run: {{ ping_tunnel_result | default({}) }}"
          - "Mgmt run: {{ ping_mgmt_result | default({}) }}"
          - "Service probe: {{ ping_service_probe | default({}) }}"
          - "IPv4 source override: {{ ping_source_ipv4 | default({}) }}"
          - "IPv6 scoped source: {{ ping_ipv6_source | default({}) }}"
          - "IPv6 VRF run: {{ ping_ipv6_vrf | default({}) }}"
          - "Invalid combo guard rail: {{ ping_invalid_combo | default({}) }}"
          - "Invalid service probe: {{ ping_invalid_probe | default({}) }}"
          - "Invalid scope id: {{ ping_invalid_scope | default({}) }}"
          - "Invalid count: {{ ping_invalid_count | default({}) }}"
          - "Invalid interface: {{ ping_invalid_interface | default({}) }}"
          - "Invalid tunnel interface: {{ ping_invalid_tunnel | default({}) }}"
          - "Invalid VLAN interface: {{ ping_invalid_vlan | default({}) }}"
          - "Invalid timeout: {{ ping_invalid_timeout | default({}) }}"
          - "Invalid source dict: {{ ping_invalid_source_dict | default({}) }}"
          - "Invalid source type: {{ ping_invalid_source_type | default({}) }}"
          - "Check mode result: {{ ping_check_mode | default({}) }}"
