---
- name: Configure routed access for port 1:5 with VLAN 105
  hosts: switches
  gather_facts: false
  tasks:
    - name: Ensure port 1:5 is an access member of VLAN 105
      extreme.fe.extreme_fe_l2_interfaces:
        interface: PORT:1:5
        port_type: ACCESS
        untagged_vlan: 105
        tagged_vlans: []
        state: replaced

    - name: Merge IPv4 address on VLAN 105 for port 1:5
      extreme.fe.extreme_fe_l3_interfaces:
        state: merged
        config:
          - vlan_id: 105
            name: VLAN 105
            ipv4:
              - 192.0.2.5/24
