    - name: Test deleted state - Remove all MLAG configuration comprehensively
      extreme.fe.extreme_fe_mlag:
        state: deleted
      register: deleted_all_comprehensive
      ignore_errors: true
      tags: [deleted, cleanup, real_api]

    # Test 47: Test port configuration edge cases
    - name: Test present state - Port configuration with duplicate MLAG IDs
      extreme.fe.extreme_fe_mlag:
