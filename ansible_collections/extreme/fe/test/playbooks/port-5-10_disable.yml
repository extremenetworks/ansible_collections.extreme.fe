---
- name: Disable ports 1:5 through 1:10
  hosts: gns3_network
  gather_facts: false
  tasks:
    - name: Disable target interfaces
      extreme.fe.extreme_fe_interfaces:
        state: merged
        admin:
          - name: "1:5"
            enabled: false
          - name: "1:6"
            enabled: false
          - name: "1:7"
            enabled: false
          - name: "1:8"
            enabled: false
          - name: "1:9"
            enabled: false
          - name: "1:10"
            enabled: false
