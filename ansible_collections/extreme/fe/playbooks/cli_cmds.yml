---
- name: Execute enable/exit toggles using extreme_fe_command
  hosts: gns3_network
  gather_facts: false
  tasks:
    - name: Send CLI commands to switch
      extreme.fe.extreme_fe_command:
        commands:
          - enable
          - terminal more disable
          - show vlan basic
          - configure terminal
          - exit
        continue_on_failure: false
