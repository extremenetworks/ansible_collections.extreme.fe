---
- name: Enable and disable Fabric Engine auto-sense on a port
  hosts: fe_dt_lower_hosts
  gather_facts: false
  vars:
    autosense_toggle_port: "1:11"
  tasks:
    - name: Gather current auto-sense enablement for the toggle port
      extreme.fe.extreme_fe_autosense:
        state: gathered
        gather_filter:
          - "{{ autosense_toggle_port }}"
      register: autosense_toggle_info

    - name: Remember original auto-sense enablement
      set_fact:
        autosense_toggle_original_enable: >-
          {{
            (
              autosense_toggle_info.ports_settings
              | selectattr('name', 'equalto', autosense_toggle_port)
              | map(attribute='settings.enable')
              | list
              | first
            )
            | default(true)
            | bool
          }}

    - name: Enable auto-sense on the toggle port
      extreme.fe.extreme_fe_autosense:
        ports:
          - name: "{{ autosense_toggle_port }}"
            enable: true

    - name: Disable auto-sense on the toggle port
      extreme.fe.extreme_fe_autosense:
        ports:
          - name: "{{ autosense_toggle_port }}"
            enable: false

    - name: Restore original auto-sense enablement
      extreme.fe.extreme_fe_autosense:
        ports:
          - name: "{{ autosense_toggle_port }}"
            enable: "{{ autosense_toggle_original_enable }}"
