---
- name: Configure VLAN 12 with port 1:8
  hosts: fe_dt_lower_hosts
  gather_facts: false
  tasks:
    - name: Configure interface 1:5 for VLAN 5 access
      extreme.fe.extreme_fe_l2_interfaces:
        interface: PORT:1:8
        port_type: ACCESS
        untagged_vlan: 12
        tagged_vlans: []
        state: replaced
