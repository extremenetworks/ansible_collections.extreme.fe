---
# Create MLAG configuration between fe_dt_1 and fe_dt_4
# Inter-switch ports: 1:15 on both switches
# Dual-homed server ports: 1:4 on fe_dt_1 and 1:8 on fe_dt_4

- name: Configure MLAG between fe_dt_1 and fe_dt_4
  hosts: fe_dt_1 fe_dt_4
  gather_facts: false
  vars:
    mlag_peer_vlan: 100
    mlag_peer_1_ip: "192.168.100.1"
    mlag_peer_4_ip: "192.168.100.4"
    inter_switch_lag_id: 15
    dual_homed_lag_id_1: 10  # LAG for dual-homed server on fe_dt_1
    dual_homed_lag_id_4: 11  # LAG for dual-homed server on fe_dt_4

  tasks:
    # Step 0: We need to disable the ISIS router
    - name: Disable ISIS router
      extreme.fe.extreme_fe_command:
        commands:
          - enable
          - terminal more disable
          - configure terminal
          - no router isis enable
          - exit
        continue_on_failure: false

    # Step 1: Force disable autosense on required ports
    - name: Force disable autosense on port 1:15
      extreme.fe.extreme_fe_autosense:
        state: merged
        ports:
          - name: "1:15"
            enable: false

    - name: Force disable autosense on port 1:4 (fe_dt_1 only)
      extreme.fe.extreme_fe_autosense:
        state: merged
        ports:
          - name: "1:4"
            enable: false
      when: inventory_hostname == 'fe_dt_1'

    - name: Force disable autosense on port 1:8 (fe_dt_4 only)
      extreme.fe.extreme_fe_autosense:
        state: merged
        ports:
          - name: "1:8"
            enable: false
      when: inventory_hostname == 'fe_dt_4'

    # Step 2: Create VLAN for MLAG peer communication
    - name: Create MLAG peer communication VLAN
      extreme.fe.extreme_fe_vlans:
        state: merged
        vlan_id: "{{ mlag_peer_vlan }}"
        vlan_name: "MLAG-Peer-VLAN"
        vlan_type: "PORT_MSTP_RSTP"

    # Step 3: Create LAGs for inter-switch communication
    - name: Create inter-switch LAG on fe_dt_1
      extreme.fe.extreme_fe_lag:
        state: merged
        lag_id: "{{ inter_switch_lag_id }}"
        name: "IST-LAG-{{ inter_switch_lag_id }}"
        mode: "LACP"
        lacp_key: "{{ inter_switch_lag_id }}"
        member_ports:
          - "1:15"
      when: inventory_hostname == 'fe_dt_1'

    - name: Create inter-switch LAG on fe_dt_4
      extreme.fe.extreme_fe_lag:
        state: merged
        lag_id: "{{ inter_switch_lag_id }}"
        name: "IST-LAG-{{ inter_switch_lag_id }}"
        mode: "LACP"
        lacp_key: "{{ inter_switch_lag_id }}"
        member_ports:
          - "1:15"
      when: inventory_hostname == 'fe_dt_4'

    # Step 4: Create LAGs for dual-homed server
    - name: Create dual-homed server LAG on fe_dt_1
      extreme.fe.extreme_fe_lag:
        state: merged
        lag_id: "{{ dual_homed_lag_id_1 }}"
        name: "Server-LAG-{{ dual_homed_lag_id_1 }}"
        mode: "LACP"
        lacp_key: "{{ dual_homed_lag_id_1 }}"
        member_ports:
          - "1:4"
      when: inventory_hostname == 'fe_dt_1'

    - name: Create dual-homed server LAG on fe_dt_4
      extreme.fe.extreme_fe_lag:
        state: merged
        lag_id: "{{ dual_homed_lag_id_4 }}"
        name: "Server-LAG-{{ dual_homed_lag_id_4 }}"
        mode: "LACP"
        lacp_key: "{{ dual_homed_lag_id_4 }}"
        member_ports:
          - "1:8"
      when: inventory_hostname == 'fe_dt_4'

    # Step 5: Configure inter-switch trunk for vIST VLAN
    # (MLAG peer communication)
    # Note: vIST VLAN cannot have port members, so create a trunk
    # carrying the vIST VLAN tagged
    - name: Recreate inter-switch LAG for trunk connectivity
      extreme.fe.extreme_fe_lag:
        lag_id: "{{ inter_switch_lag_id }}"
        name: "IST-LAG-{{ inter_switch_lag_id }}"
        mode: "LACP"
        lacp_key: "{{ inter_switch_lag_id }}"
        member_ports:
          - "1:15"
        state: merged

    # Inter-switch LAG configured as basic LAG, so L2 interface
    # configuration is not needed for vIST

    # Step 6: Configure L3 interfaces for MLAG peer IP addresses
    - name: Configure MLAG peer IP on fe_dt_1
      extreme.fe.extreme_fe_l3_interfaces:
        state: merged
        config:
          - type: vlan
            vlan_id: "{{ mlag_peer_vlan }}"
            ipv4:
              - "{{ mlag_peer_1_ip }}/24"
      when: inventory_hostname == 'fe_dt_1'

    - name: Configure MLAG peer IP on fe_dt_4
      extreme.fe.extreme_fe_l3_interfaces:
        state: merged
        config:
          - type: vlan
            vlan_id: "{{ mlag_peer_vlan }}"
            ipv4:
              - "{{ mlag_peer_4_ip }}/24"
      when: inventory_hostname == 'fe_dt_4'

    # Step 7: Associate vIST VLAN with ISID for MLAG
    - name: Create ISID for vIST VLAN
      extreme.fe.extreme_fe_fabric_l2:
        isid: "{{ mlag_peer_vlan }}"
        cvlan: "{{ mlag_peer_vlan }}"
        name: "MLAG-vIST-{{ mlag_peer_vlan }}"
        state: merged

    # Step 8: Configure MLAG peers
    - name: Configure MLAG peer on fe_dt_1
      extreme.fe.extreme_fe_mlag:
        state: present
        config:
          peers:
            - peer_id: "1"
              peer_ip_address: "{{ mlag_peer_4_ip }}"
              local_ip_address: "{{ mlag_peer_1_ip }}"
              local_vlan_id: "{{ mlag_peer_vlan }}"
              ports:
                - port_id: "{{ dual_homed_lag_id_1 }}"
      when: inventory_hostname == 'fe_dt_1'

    - name: Configure MLAG peer on fe_dt_4
      extreme.fe.extreme_fe_mlag:
        state: present
        config:
          peers:
            - peer_id: "1"
              peer_ip_address: "{{ mlag_peer_1_ip }}"
              local_ip_address: "{{ mlag_peer_4_ip }}"
              local_vlan_id: "{{ mlag_peer_vlan }}"
              ports:
                - port_id: "{{ dual_homed_lag_id_4 }}"
      when: inventory_hostname == 'fe_dt_4'

    # Step 9: Configure RSMLT for Layer 3 redundancy
    # Note: RSMLT cannot be configured on the vIST VLAN, only on data VLANs
    # For basic MLAG functionality, RSMLT on the vIST VLAN is not required
    # - name: Configure RSMLT instance (skipped - vIST VLAN cannot have RSMLT)
    #   debug:
    #     msg: >
    #       RSMLT configuration skipped - vIST VLAN {{ mlag_peer_vlan }} cannot
    #       have RSMLT records

    # Step 10: Verify MLAG configuration
    - name: Gather MLAG configuration and state
      extreme.fe.extreme_fe_mlag:
        state: gathered
        gather_filter:
          include_ports: true
          include_rsmlt: true
          include_state: true
      register: mlag_status

    - name: Display MLAG status
      debug:
        var: mlag_status.gathered
        verbosity: 1
    # Step 11: Save configuration
    # (optional via extreme_fe_save_config once permitted)
    - name: Gather facts for timestamp
      setup:
        gather_subset: min
