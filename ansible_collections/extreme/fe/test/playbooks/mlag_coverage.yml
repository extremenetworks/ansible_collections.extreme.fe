                - port_id: "{{ coverage_lag_id_2 }}"  # Omit mlag_id
      register: port_edge_cases
      ignore_errors: true
      tags: [present, edge_cases, real_api]

    # Test 48: Test RSMLT with extreme timer values
    - name: Test RSMLT - Extreme timer boundary values
