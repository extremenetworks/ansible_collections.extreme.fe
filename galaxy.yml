---
namespace: extreme
name: fe
version: 1.0.0
readme: README.md
authors:
  - ExtremeNetworks Networking Automation Team

description: >-
  Ansible collection for managing Extreme Networks Fabric Engine (VOSS) switches
  via REST API. Provides modules for auto-sense, interfaces, VLANs, LAG, MLAG,
  PoE, and other network configuration tasks.

license_file: LICENSE

tags:
  - networking
  - extreme
  - voss
  - fabric_engine
  - switch
  - network_automation

dependencies:
  ansible.netcommon: ">=5.0.0"

repository: https://github.com/extremenetworks/ansible_collections.extreme.fe
documentation: https://github.com/extremenetworks/ansible_collections.extreme.fe/blob/main/README.md
homepage: https://github.com/extremenetworks/ansible_collections.extreme.fe
issues: https://github.com/extremenetworks/ansible_collections.extreme.fe/issues

build_ignore:
  - .git
  - .github
  - .gitignore
  - .pytest_cache
  - .mypy_cache
  - .tox
  - .venv
  - venv
  - "*.tar.gz"
  - tests/output
  - __pycache__
