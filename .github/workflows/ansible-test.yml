---
name: Ansible Collection CI

on:
  pull_request:
    branches:
      - main
      - master
      - Dev-Unit-Test-new
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  NAMESPACE: extreme
  COLLECTION_NAME: fe
  # The collection is nested inside ansible_collections/extreme/fe in the repo
  COLLECTION_PATH: ansible_collections/extreme/fe

jobs:
  sanity:
    name: Sanity (Ⓐ${{ matrix.ansible }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - stable-2.15
          - stable-2.16
          - stable-2.17
        python:
          - "3.10"
          - "3.11"
        exclude:
          - ansible: stable-2.15
            python: "3.12"
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up proper collection structure
        run: |
          # Create the proper Ansible collection directory structure
          mkdir -p ~/.ansible/collections/ansible_collections/${{ env.NAMESPACE }}
          # Link the nested collection to the proper location
          ln -s ${{ github.workspace }}/${{ env.COLLECTION_PATH }} ~/.ansible/collections/ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION_NAME }}

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-base (${{ matrix.ansible }})
        run: |
          python -m pip install --upgrade pip
          pip install https://github.com/ansible/ansible/archive/${{ matrix.ansible }}.tar.gz --disable-pip-version-check

      - name: Install collection dependencies
        run: |
          ansible-galaxy collection install ansible.netcommon

      - name: Run sanity tests
        run: |
          ansible-test sanity --local -v --color --python ${{ matrix.python }}
        working-directory: ${{ env.COLLECTION_PATH }}

  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint

      - name: Install collection dependencies
        run: |
          ansible-galaxy collection install ansible.netcommon

      - name: Run ansible-lint
        run: |
          ansible-lint --profile production
        working-directory: ${{ env.COLLECTION_PATH }}
        continue-on-error: true

  galaxy-import:
    name: Galaxy Import Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core

      - name: Install collection dependencies
        run: |
          ansible-galaxy collection install ansible.netcommon

      - name: Build collection
        run: |
          ansible-galaxy collection build --force
        working-directory: ${{ env.COLLECTION_PATH }}

      - name: Verify collection artifact
        run: |
          ls -la *.tar.gz
          tar -tzf *.tar.gz | head -50
        working-directory: ${{ env.COLLECTION_PATH }}

      - name: Install built collection
        run: |
          ansible-galaxy collection install *.tar.gz -p ./installed_collections --force
        working-directory: ${{ env.COLLECTION_PATH }}

      - name: Verify installation
        run: |
          ansible-galaxy collection list -p ./installed_collections
        working-directory: ${{ env.COLLECTION_PATH }}

  unit-tests:
    name: Unit Tests (Ⓐ${{ matrix.ansible }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - stable-2.15
          - stable-2.16
          - stable-2.17
        python:
          - "3.11"
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up proper collection structure
        run: |
          mkdir -p ~/.ansible/collections/ansible_collections/${{ env.NAMESPACE }}
          ln -s ${{ github.workspace }}/${{ env.COLLECTION_PATH }} ~/.ansible/collections/ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION_NAME }}

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-base (${{ matrix.ansible }})
        run: |
          python -m pip install --upgrade pip
          pip install https://github.com/ansible/ansible/archive/${{ matrix.ansible }}.tar.gz --disable-pip-version-check
          pip install pytest pytest-mock

      - name: Install collection dependencies
        run: |
          ansible-galaxy collection install ansible.netcommon

      - name: Create unit test directory structure
        run: |
          mkdir -p tests/unit/plugins/modules
          mkdir -p tests/unit/plugins/httpapi
        working-directory: ${{ env.COLLECTION_PATH }}

      - name: Run unit tests
        run: |
          if [ -d "tests/unit" ] && [ "$(find tests/unit -name 'test_*.py' 2>/dev/null | wc -l)" -gt 0 ]; then
            ansible-test units --local -v --color --python ${{ matrix.python }}
          else
            echo "No unit tests found, skipping..."
          fi
        working-directory: ${{ env.COLLECTION_PATH }}

  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core antsibull-docs

      - name: Install collection dependencies
        run: |
          ansible-galaxy collection install ansible.netcommon

      - name: Validate module documentation
        run: |
          # Check that all modules have proper documentation
          for module in plugins/modules/*.py; do
            if [ -f "$module" ]; then
              echo "Checking documentation in $module"
              if grep -q "^DOCUMENTATION" "$module"; then
                echo "  ✓ DOCUMENTATION found"
              else
                echo "  WARNING: Missing DOCUMENTATION in $module"
              fi
              if grep -q "^EXAMPLES" "$module"; then
                echo "  ✓ EXAMPLES found"
              else
                echo "  WARNING: Missing EXAMPLES in $module"
              fi
            fi
          done
        working-directory: ${{ env.COLLECTION_PATH }}

  python-syntax:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyflakes flake8

      - name: Run syntax check
        run: |
          find plugins -name "*.py" -exec python -m py_compile {} \;
          echo "All Python files have valid syntax"
        working-directory: ${{ env.COLLECTION_PATH }}

      - name: Run flake8 (warnings only)
        run: |
          flake8 plugins --max-line-length=160 --ignore=E501,W503,E203 --statistics || true
        working-directory: ${{ env.COLLECTION_PATH }}
        continue-on-error: true
