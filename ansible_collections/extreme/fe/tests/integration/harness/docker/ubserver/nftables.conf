table ip nat {
    chain prerouting {
        type nat hook prerouting priority 0;
    }

    chain postrouting {
        type nat hook postrouting priority 100;
        oif "eth0" masquerade
    }
}

table ip filter {
    chain forward {
        type filter hook forward priority 0;
        policy drop;

        iif "eth1" oif "eth0" accept
        iif "eth0" oif "eth1" ct state established,related accept
    }
}

