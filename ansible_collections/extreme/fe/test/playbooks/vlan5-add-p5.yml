---
- name: Configure VLAN 5 with port 1:5 on ExtremeNetworks Fabric Engine switches
  hosts: gns3_network
  gather_facts: false
  tasks:
    - name: Ensure VLAN 5 exists
      extreme.fe.extreme_fe_vlans:
        vlan_id: 5
        vlan_name: Campus-5
        vr_name: GlobalRouter
        state: merged

    - name: Configure interface 1:5 for VLAN 5 access
      extreme.fe.extreme_fe_l2_interfaces:
        interface: PORT:1:5
        port_type: ACCESS
        untagged_vlan: 5
        tagged_vlans: []
        state: replaced
