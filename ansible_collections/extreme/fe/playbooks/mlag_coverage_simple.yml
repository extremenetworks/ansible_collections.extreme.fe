---
# Simplified MLAG module coverage playbook
# This playbook tests key functionality of the extreme_fe_mlag module
# to achieve strong (>80%) code coverage

- name: MLAG Module Enhanced Coverage Testing
  hosts: fe_dt_1 fe_dt_4
  gather_facts: false
  vars:
    test_vlan_1: 101
    test_vlan_2: 102
    test_peer_1_ip: "192.168.101.1"
    test_peer_2_ip: "192.168.101.2"
    test_lag_id_1: 20
    mlag_simple_primary_remote_ip: >-
      {{
        test_peer_2_ip if inventory_hostname == 'fe_dt_1'
        else test_peer_1_ip
      }}
    mlag_simple_primary_local_ip: >-
      {{
        test_peer_1_ip if inventory_hostname == 'fe_dt_1'
        else test_peer_2_ip
      }}
    mlag_simple_secondary_remote_ip: "{{ mlag_simple_primary_local_ip }}"
    mlag_simple_secondary_local_ip: "{{ mlag_simple_primary_remote_ip }}"

  tasks:
    # Test 1: Parameter validation - invalid state
    - name: Test invalid state parameter
      extreme.fe.extreme_fe_mlag:
        state: invalid_state
        test_mode: true
      ignore_errors: true
      tags: validation

    # Test 2: Gathered state with test mode
    - name: Test gathered state empty
      extreme.fe.extreme_fe_mlag:
        state: gathered
        test_mode: true
        gather_filter:
          include_ports: true
          include_rsmlt: true
          include_state: false
      register: gathered_empty
      tags: gathered

    # Test 3: Present state - Create MLAG peer
    - name: Test present state - Create MLAG peer
      extreme.fe.extreme_fe_mlag:
        state: present
        test_mode: true
        config:
          peers:
            - peer_id: "test_peer_1"
              peer_ip_address: "{{ mlag_simple_primary_remote_ip }}"
              local_ip_address: "{{ mlag_simple_primary_local_ip }}"
              local_vlan_id: "{{ test_vlan_1 }}"
      register: create_peer
      tags: present

    # Test 4: Present state - Add ports to peer
    - name: Test present state - Add ports
      extreme.fe.extreme_fe_mlag:
        state: present
        test_mode: true
        config:
          peers:
            - peer_id: "test_peer_1"
              ports:
                - port_id: "{{ test_lag_id_1 }}"
      register: add_ports
      tags: present

    # Test 5: Present state - Create RSMLT
    - name: Test present state - Create RSMLT
      extreme.fe.extreme_fe_mlag:
        state: present
        test_mode: true
        config:
          rsmlt:
            instances:
              - vlan_id: "{{ test_vlan_1 }}"
                enabled: true
                hold_up_timer: 30
                hold_down_timer: 15
              - vlan_id: "{{ test_vlan_2 }}"
                enabled: false
                hold_up_timer: 60
                hold_down_timer: 30
      register: create_rsmlt
      tags: rsmlt

    # Test 6: Merged state - Additional peer
    - name: Test merged state - Add second peer
      extreme.fe.extreme_fe_mlag:
        state: merged
        test_mode: true
        config:
          peers:
            - peer_id: "test_peer_2"
              peer_ip_address: "{{ mlag_simple_secondary_remote_ip }}"
              local_ip_address: "{{ mlag_simple_secondary_local_ip }}"
              local_vlan_id: "{{ test_vlan_2 }}"
              authentication_key: "test_auth_key"
      register: merged_peer
      tags: merged

    # Test 7: Replaced state - Replace configuration
    - name: Test replaced state
      extreme.fe.extreme_fe_mlag:
        state: replaced
        test_mode: true
        config:
          peers:
            - peer_id: "replaced_peer"
              peer_ip_address: "192.168.200.1"
              local_ip_address: "192.168.200.2"
              local_vlan_id: "{{ test_vlan_1 }}"
          rsmlt:
            instances:
              - vlan_id: "{{ test_vlan_1 }}"
                enabled: true
                hold_up_timer: 45
                hold_down_timer: 20
      register: replaced_config
      tags: replaced

    # Test 8: Absent state - Delete specific peer
    - name: Test absent state - Delete peer
      extreme.fe.extreme_fe_mlag:
        state: absent
        test_mode: true
        config:
          peers:
            - peer_id: "test_peer_1"
      register: absent_peer
      tags: absent

    # Test 9: Deleted state - Remove all configuration
    - name: Test deleted state - Remove all
      extreme.fe.extreme_fe_mlag:
        state: deleted
        test_mode: true
      register: deleted_all
      tags: deleted

    # Test 10: Gathered with filters
    - name: Test gathered with peer filter
      extreme.fe.extreme_fe_mlag:
        state: gathered
        test_mode: true
        gather_filter:
          peer_ids: ["test_peer_1"]
          include_ports: true
          include_rsmlt: false
      register: gathered_filtered
      tags: gathered

    # Test 11: Error handling - Invalid parameters
    - name: Test error - Invalid IP addresses
      extreme.fe.extreme_fe_mlag:
        state: present
        test_mode: true
        config:
          peers:
            - peer_id: "invalid_peer"
              peer_ip_address: "999.999.999.999"
              local_ip_address: "invalid_ip"
      ignore_errors: true
      tags: error_handling

    # Test 12: Error handling - Non-existent peer deletion
    - name: Test error - Delete non-existent peer
      extreme.fe.extreme_fe_mlag:
        state: absent
        test_mode: true
        config:
          peers:
            - peer_id: "non_existent_peer"
      ignore_errors: true
      tags: error_handling

    # Test 13: Minimal configuration
    - name: Test minimal peer config
      extreme.fe.extreme_fe_mlag:
        state: present
        test_mode: true
        config:
          peers:
            - peer_id: "minimal_peer"
              peer_ip_address: "192.168.100.1"
              local_ip_address: "192.168.100.2"
      register: minimal_config
      tags: minimal

    # Test 14: RSMLT with boundary values
    - name: Test RSMLT boundary values
      extreme.fe.extreme_fe_mlag:
        state: present
        test_mode: true
        config:
          rsmlt:
            instances:
              - vlan_id: "{{ test_vlan_1 }}"
                enabled: true
                hold_up_timer: 0
                hold_down_timer: 0
              - vlan_id: "{{ test_vlan_2 }}"
                enabled: false
                hold_up_timer: 65535
                hold_down_timer: 65535
      register: rsmlt_boundary
      tags: rsmlt_edge

    # Test 15: Authentication key variations
    - name: Test empty auth key
      extreme.fe.extreme_fe_mlag:
        state: present
        test_mode: true
        config:
          peers:
            - peer_id: "empty_auth"
              peer_ip_address: "192.168.201.1"
              local_ip_address: "192.168.201.2"
              authentication_key: ""
      ignore_errors: true
      tags: auth_edge

    # Test 16: Long auth key
    - name: Test long auth key
      extreme.fe.extreme_fe_mlag:
        state: present
        test_mode: true
        config:
          peers:
            - peer_id: "long_auth"
              peer_ip_address: "192.168.202.1"
              local_ip_address: "192.168.202.2"
              authentication_key: >-
                very_long_authentication_key_that_tests_boundary_conditions_for_string_handling_in_module
      ignore_errors: true
      tags: auth_edge

    # Test 17: Priority boundary values
    - name: Test priority boundaries
      extreme.fe.extreme_fe_mlag:
        state: present
        test_mode: true
        config:
          peers:
            - peer_id: "priority_test"
              peer_ip_address: "192.168.203.1"
              local_ip_address: "192.168.203.2"
              priority: 255
      ignore_errors: true
      tags: priority_edge

    # Test 18: Check mode
    - name: Test check mode
      extreme.fe.extreme_fe_mlag:
        state: present
        test_mode: true
        config:
          peers:
            - peer_id: "check_mode_peer"
              peer_ip_address: "192.168.204.1"
              local_ip_address: "192.168.204.2"
      check_mode: true
      tags: check_mode

    # Test 19: Multiple peers and ports
    - name: Test multiple peers with ports
      extreme.fe.extreme_fe_mlag:
        state: present
        test_mode: true
        config:
          peers:
            - peer_id: "multi_peer_1"
              peer_ip_address: "192.168.205.1"
              local_ip_address: "192.168.205.2"
              ports:
                - port_id: "20"
                - port_id: "21"
            - peer_id: "multi_peer_2"
              peer_ip_address: "192.168.206.1"
              local_ip_address: "192.168.206.2"
              ports:
                - port_id: "22"
      register: multi_peers
      tags: multi_config

    # Test 20: Final cleanup
    - name: Final cleanup test
      extreme.fe.extreme_fe_mlag:
        state: deleted
        test_mode: true
      register: final_cleanup
      tags: cleanup

    # Test 21: Display coverage summary
    - name: Display coverage summary
      debug:
        msg:
          - "MLAG Module Enhanced Coverage Testing Complete"
          - "Executed {{ ansible_play_batch | length * 21 }} test scenarios"
          - "Tested states: present, absent, gathered, merged"
          - "Also covered replaced and deleted flows"
          - "Tested error conditions and edge cases"
          - "Tested various parameter combinations and boundary values"
      tags: summary
