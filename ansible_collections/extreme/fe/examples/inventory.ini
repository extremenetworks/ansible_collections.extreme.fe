# =============================================================================
# Extreme Networks FabricEngine Inventory File
# =============================================================================
# Use with: ansible-playbook -i inventory.ini playbook.yml
# =============================================================================

[switches]
# Option 1: Disable certificate validation (for testing/lab with self-signed certs)
fe_sw_1 ansible_host=SWITCH_IP_ADDRESS

# Option 2: Certificate validation enabled (recommended for production)
# Uncomment the line below and comment out the line above
# Using hostname from certificate CN (mapped in /etc/hosts to SWITCH_IP_ADDRESS)
#fe_sw_1 ansible_host=CommonNameOrHostname

[switches:vars]
# -----------------------------------------------------------------------------
# Connection Type
# -----------------------------------------------------------------------------
ansible_connection=httpapi
ansible_network_os=extreme.fe.extreme_fe

# -----------------------------------------------------------------------------
# REST API Endpoint
# -----------------------------------------------------------------------------
ansible_httpapi_port=9443
ansible_httpapi_base_path=/rest/openapi

# -----------------------------------------------------------------------------
# SSL/TLS Settings
# -----------------------------------------------------------------------------
ansible_httpapi_use_ssl=true

# Option 1: Disable certificate validation (for testing/lab with self-signed certs)
ansible_httpapi_validate_certs=false

# Option 2: Enable certificate validation (recommended for production)
# Uncomment the two lines below and comment out the line above
#ansible_httpapi_validate_certs=true
#ansible_httpapi_ca_path=certs/fe_switch_cert.pem

# -----------------------------------------------------------------------------
# Authentication
# -----------------------------------------------------------------------------
ansible_user=ADMIN_USER
ansible_password=PASSWORD