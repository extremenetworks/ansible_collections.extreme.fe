---
# Delete MLAG configuration created by create_mlag.yml
# This playbook removes all MLAG, LAG, VLAN, and IP configurations

- name: Delete MLAG configuration between fe_dt_1 and fe_dt_4
  hosts: fe_dt_1 fe_dt_4
  gather_facts: false
  vars:
    mlag_peer_vlan: 100
    inter_switch_lag_id: 15
    dual_homed_lag_id_1: 10  # LAG for dual-homed server on fe_dt_1
    dual_homed_lag_id_4: 11  # LAG for dual-homed server on fe_dt_4

  tasks:
    # Step 0: Gather facts for timestamp
    - name: Gather facts
      ansible.builtin.setup:
      when: ansible_date_time is not defined

    # Step 1: Gather current MLAG configuration
    - name: Gather current MLAG configuration
      extreme.fe.extreme_fe_mlag:
        state: gathered
        gather_filter:
          include_ports: true
          include_rsmlt: true
          include_state: false
      register: current_mlag_config
      ignore_errors: true

    - name: Display current MLAG configuration
      debug:
        var: current_mlag_config.gathered
        verbosity: 1
      when:
        - current_mlag_config is defined
        - current_mlag_config.gathered is defined

    # Step 2: Delete all MLAG configuration
    - name: Delete all MLAG configuration
      extreme.fe.extreme_fe_mlag:
        state: deleted
      ignore_errors: true

    # Step 3: Remove L3 interfaces for MLAG peer communication
    - name: Remove MLAG peer IP configuration
      extreme.fe.extreme_fe_l3_interfaces:
        state: deleted
        config:
          - type: vlan
            vlan_id: "{{ mlag_peer_vlan }}"
      ignore_errors: true

    # Step 4: Delete LAGs created for MLAG
    - name: Delete dual-homed server LAG on fe_dt_1
      extreme.fe.extreme_fe_lag:
        state: deleted
        lag_id: "{{ dual_homed_lag_id_1 }}"
      when: inventory_hostname == 'fe_dt_1'
      ignore_errors: true

    - name: Delete dual-homed server LAG on fe_dt_4
      extreme.fe.extreme_fe_lag:
        state: deleted
        lag_id: "{{ dual_homed_lag_id_4 }}"
      when: inventory_hostname == 'fe_dt_4'
      ignore_errors: true

    - name: Delete inter-switch LAG
      extreme.fe.extreme_fe_lag:
        state: deleted
        lag_id: "{{ inter_switch_lag_id }}"
      ignore_errors: true

    # Step 5: Delete MLAG peer communication VLAN
    - name: Delete MLAG peer communication VLAN
      extreme.fe.extreme_fe_vlans:
        state: deleted
        vlan_id: "{{ mlag_peer_vlan }}"
      ignore_errors: true

    # Step 6: Verify MLAG deletion
    - name: Verify MLAG configuration is deleted
      extreme.fe.extreme_fe_mlag:
        state: gathered
        gather_filter:
          include_ports: true
          include_rsmlt: true
          include_state: false
      register: final_mlag_config
      ignore_errors: true

    - name: Display final MLAG configuration (should be empty)
      debug:
        var: final_mlag_config.gathered
        verbosity: 1
      when:
        - final_mlag_config is defined
        - final_mlag_config.gathered is defined

    - name: Assert MLAG configuration is cleaned up
      assert:
        that:
          - final_mlag_config.gathered.peers | length == 0
          - final_mlag_config.gathered.rsmlt.instances | length == 0
        fail_msg: "MLAG configuration was not completely removed"
        success_msg: "MLAG configuration successfully removed"
      when:
        - final_mlag_config is defined
        - final_mlag_config.gathered is defined
      ignore_errors: true

    # Step 7: Re-enable autosense on ports that were disabled for MLAG
    - name: Re-enable autosense on port 1:15
      extreme.fe.extreme_fe_autosense:
        state: merged
        ports:
          - name: "1:15"
            enable: true
      ignore_errors: true

    - name: Re-enable autosense on port 1:4 (fe_dt_1 only)
      extreme.fe.extreme_fe_autosense:
        state: merged
        ports:
          - name: "1:4"
            enable: true
      when: inventory_hostname == 'fe_dt_1'
      ignore_errors: true

    - name: Re-enable autosense on port 1:8 (fe_dt_4 only)
      extreme.fe.extreme_fe_autosense:
        state: merged
        ports:
          - name: "1:8"
            enable: true
      when: inventory_hostname == 'fe_dt_4'
      ignore_errors: true
      # Optional Step 8: Save configuration with extreme_fe_save_config.
      # Re-enable when permitted and supply a unique filename.
