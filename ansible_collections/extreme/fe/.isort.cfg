[settings]
# Extreme FE Ansible Collection - isort Configuration

profile = black
line_length = 120
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

# Known first party
known_first_party = ansible_collections.extreme.fe

# Known third party
known_third_party = ansible,yaml,jinja2

# Skip files
skip = 
    .git
    __pycache__
    build
    dist
    .tox
    .venv
    venv
    tests/output

# Skip glob patterns
skip_glob = 
    **/tests/output/*
