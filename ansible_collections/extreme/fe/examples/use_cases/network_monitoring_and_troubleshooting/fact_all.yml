---
- name: Gather all Fabric Engine facts and resources
  hosts: gns3_network
  gather_facts: false
  tasks:
    - name: Collect full extreme_fe_facts dataset
      extreme.fe.extreme_fe_facts:
        gather_subset:
          - all
        gather_network_resources:
          - all
      register: fe_all

    - name: Show gathered subsets and resources
      vars:
        gathered_subsets: >-
          {{ fe_all.ansible_facts.extreme_fe_facts_gathered_subsets }}
        gathered_resources: >-
          {{ fe_all.ansible_facts.extreme_fe_facts_gathered_network_resources }}
      debug:
        msg:
          subsets: "{{ gathered_subsets }}"
          resources: "{{ gathered_resources }}"
