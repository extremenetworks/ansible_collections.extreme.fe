---
# =============================================================================
# VLAN + ISID Cleanup - Remove Previously Created Resources
# =============================================================================
#
# What this does:
#   Removes resources created by provision_vlan_service.yml:
#   1. Gather the VLAN info to find its actual configuration (VR, etc.)
#   2. Find the ISID bound to the VLAN (if any)
#   3. Delete the ISID bound to the VLAN (must be deleted before VLAN)
#   4. Delete VLAN using its actual VR name
#   5. Delete saved configuration file (depending on mode)
#
# Use case:
#   Clean up after testing or when decommissioning a service
#
# NOTE: This playbook automatically finds and deletes the ISID bound to the
#       specified VLAN - you don't need to know what ISID was used.
#       It also auto-detects the VR the VLAN belongs to.
#
# =============================================================================
# SMART BEHAVIOR - Auto-detects what to delete based on parameters provided
# =============================================================================
#
# | Command                              | Behavior                              |
# |--------------------------------------|---------------------------------------|
# | (no parameters)                      | Delete default VLAN 5 + ISID + config.cfg |
# | -e vlan_id=X                         | Delete only VLAN X + ISID (no config) |
# | -e config_name=X                     | Delete only config file X (no VLAN)  |
# | -e vlan_id=X -e config_name=Y        | Delete VLAN X + ISID + config Y      |
#
# =============================================================================
# USAGE EXAMPLES
# =============================================================================
#
# Delete default VLAN (5) + ISID + default config (config.cfg):
#   ansible-playbook cleanup_vlan_service.yml -i inventory.ini
#
# Delete only specific VLAN (e.g., VLAN 50 and its bound ISID) - NO config:
#   ansible-playbook cleanup_vlan_service.yml -i inventory.ini -e vlan_id=50
#
# Delete only a specific config file - NO VLAN:
#   ansible-playbook cleanup_vlan_service.yml -i inventory.ini -e config_name=iot-config.cfg
#
# Delete specific VLAN + specific config file:
#   ansible-playbook cleanup_vlan_service.yml -i inventory.ini -e vlan_id=50 -e config_name=iot-config.cfg
#
# Dry run (check mode) - see what would be deleted without making changes:
#   ansible-playbook cleanup_vlan_service.yml -i inventory.ini --check
#
# =============================================================================

- name: Cleanup VLAN and ISID Resources
  hosts: switches
  gather_facts: false

  vars:
    # =====================
    # INTERNAL DEFAULT VALUES (used when nothing is specified)
    # =====================
    _default_vlan_id: 5
    _default_config_name: "config.cfg"

    # =====================
    # SMART MODE DETECTION:
    # - No params: delete default VLAN + default config
    # - vlan_id only: delete that VLAN (no config)
    # - config_name only: delete that config (no VLAN)
    # - both: delete both specified
    # =====================
    _vlan_was_specified: "{{ vlan_id is defined }}"
    _config_was_specified: "{{ config_name is defined }}"
    _nothing_specified: "{{ not _vlan_was_specified and not _config_was_specified }}"

    # Determine actual values to use
    _actual_vlan_id: "{{ vlan_id | default(_default_vlan_id) }}"
    _actual_config_name: "{{ config_name | default(_default_config_name) }}"

    # Determine what to delete:
    # - If nothing specified: delete both defaults
    # - If only vlan_id specified: delete VLAN only
    # - If only config_name specified: delete config only
    # - If both specified: delete both
    _cleanup_vlan: "{{ _nothing_specified or _vlan_was_specified }}"
    _cleanup_config: "{{ _nothing_specified or _config_was_specified }}"

  tasks:
    # -------------------------------------------------------------------------
    # Step 1: Show what will be removed (smart detection)
    # -------------------------------------------------------------------------
    - name: "Step 1 - Show cleanup mode"
      ansible.builtin.debug:
        msg:
          - "=== CLEANUP MODE ==="
          - "Parameters detected:"
          - "  - vlan_id provided: {{ _vlan_was_specified | ternary('YES (' ~ (vlan_id | default('')) ~ ')', 'NO') }}"
          - "  - config_name provided: {{ _config_was_specified | ternary('YES (' ~ (config_name | default('')) ~ ')', 'NO') }}"
          - ""
          - "Actions to perform:"
          - "  - Delete VLAN: {{ _cleanup_vlan | ternary('YES - VLAN ' ~ _actual_vlan_id ~ ' and all bound ISIDs', 'NO') }}"
          - "  - Delete config: {{ _cleanup_config | ternary('YES - ' ~ _actual_config_name, 'NO') }}"

    # -------------------------------------------------------------------------
    # Step 2: Gather VLAN info to get its actual VR name
    # -------------------------------------------------------------------------
    - name: "Step 2 - Gather current VLAN information"
      extreme.fe.extreme_fe_vlans:
        state: gathered
      register: vlans_info
      when: _cleanup_vlan | bool

    - name: "Step 2 - Find VLAN {{ _actual_vlan_id }} configuration"
      ansible.builtin.set_fact:
        _existing_vlan: "{{ vlans_info.vlans | default([]) | selectattr('id', 'defined') | selectattr('id', 'equalto', _actual_vlan_id | int) | list | first | default({}) }}"
      when: _cleanup_vlan | bool

    - name: "Step 2 - Get VLAN VR name"
      ansible.builtin.set_fact:
        _vlan_vr_name: "{{ _existing_vlan.vrName | default('GlobalRouter') }}"
      when: _cleanup_vlan | bool

    - name: "Step 2 - Show VLAN info found"
      ansible.builtin.debug:
        msg:
          - "VLAN {{ _actual_vlan_id }} found: {{ (_existing_vlan | length > 0) | ternary('YES', 'NO') }}"
          - "VLAN Name: {{ _existing_vlan.name | default('N/A') }}"
          - "VLAN VR: {{ _vlan_vr_name | default('N/A') }}"
      when: _cleanup_vlan | bool

    # -------------------------------------------------------------------------
    # Step 3: Find the ISID bound to the VLAN
    # -------------------------------------------------------------------------
    - name: "Step 3 - Gather current ISID information"
      extreme.fe.extreme_fe_fabric_l2:
        state: gathered
      register: isid_info
      when: _cleanup_vlan | bool

    - name: "Step 3 - Find ISID bound to VLAN {{ _actual_vlan_id }}"
      ansible.builtin.set_fact:
        isid_to_delete: "{{ isid_info.gathered[0].cvlan | default([]) | selectattr('platformVlanId', 'equalto', _actual_vlan_id | int) | map(attribute='isid') | first | default(0) }}"
      when: _cleanup_vlan | bool

    - name: "Step 3 - Show ISID found"
      ansible.builtin.debug:
        msg:
          - "ISID bound to VLAN {{ _actual_vlan_id }}: {{ (isid_to_delete | int > 0) | ternary(isid_to_delete, 'None found') }}"
      when: _cleanup_vlan | bool

    # -------------------------------------------------------------------------
    # Step 4: Delete the ISID bound to the VLAN (must delete before VLAN)
    # -------------------------------------------------------------------------
    - name: "Step 4 - Delete ISID {{ isid_to_delete }} (bound to VLAN {{ _actual_vlan_id }})"
      extreme.fe.extreme_fe_fabric_l2:
        isid: "{{ isid_to_delete | int }}"
        state: deleted
      register: cleanup_isid_result
      when: _cleanup_vlan | bool and (isid_to_delete | int > 0)
      ignore_errors: true

    - name: "Step 4 - Show ISID deletion result"
      ansible.builtin.debug:
        msg:
          - "ISID {{ isid_to_delete }} deletion: {{ cleanup_isid_result.changed | default(false) | ternary('SUCCESS', (isid_to_delete | int > 0) | ternary('ERROR', 'NO ISID BOUND')) }}"
      when: _cleanup_vlan | bool

    # -------------------------------------------------------------------------
    # Step 5: Delete VLAN (using actual VR name)
    # -------------------------------------------------------------------------
    - name: "Step 5 - Delete VLAN {{ _actual_vlan_id }} from VR {{ _vlan_vr_name }}"
      extreme.fe.extreme_fe_vlans:
        vlan_id: "{{ _actual_vlan_id }}"
        vr_name: "{{ _vlan_vr_name }}"
        state: deleted
      register: cleanup_vlan_result
      when: _cleanup_vlan | bool and (_existing_vlan | length > 0)
      ignore_errors: true

    - name: "Step 5 - Show VLAN deletion result"
      ansible.builtin.debug:
        msg:
          - "VLAN {{ _actual_vlan_id }} deletion: {{ cleanup_vlan_result.changed | default(false) | ternary('SUCCESS', (_existing_vlan | length > 0) | ternary('ERROR', 'VLAN NOT FOUND')) }}"
      when: _cleanup_vlan | bool

    # -------------------------------------------------------------------------
    # Step 6: Delete config file
    # -------------------------------------------------------------------------
    - name: "Step 6 - Delete config file {{ _actual_config_name }}"
      extreme.fe.extreme_fe_command:
        commands:
          - "delete \"{{ _actual_config_name }}\""
      register: cleanup_config_result
      when: _cleanup_config | bool
      ignore_errors: true

    - name: "Step 6 - Show config file deletion result"
      ansible.builtin.debug:
        msg:
          - "Config file {{ _actual_config_name }} deletion: {{ cleanup_config_result.changed | default(false) | ternary('SUCCESS', 'NOT FOUND or ERROR') }}"
      when: _cleanup_config | bool

    # -------------------------------------------------------------------------
    # Step 7: Summary
    # -------------------------------------------------------------------------
    - name: "Step 7 - Cleanup Summary"
      ansible.builtin.debug:
        msg:
          - "=== CLEANUP COMPLETE ==="
          - "{{ _cleanup_vlan | ternary('VLAN ' ~ _actual_vlan_id ~ ' (VR: ' ~ (_vlan_vr_name | default('N/A')) ~ ') deleted: ' ~ (cleanup_vlan_result.changed | default(false) | ternary('✓ YES', '✗ NO')), 'VLAN: not requested') }}"
          - "{{ _cleanup_vlan | ternary('ISID deleted: ' ~ ((isid_to_delete | default(0) | int > 0) | ternary(isid_to_delete, 'none bound')), 'ISID: not requested') }}"
          - "{{ _cleanup_config | ternary('Config ' ~ _actual_config_name ~ ' deleted: ' ~ (cleanup_config_result.changed | default(false) | ternary('✓ YES', '✗ NO')), 'Config: not requested') }}"
