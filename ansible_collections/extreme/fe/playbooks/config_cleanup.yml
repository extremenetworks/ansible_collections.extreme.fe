---
- name: Configuration cleanup
  hosts: gns3_network
  gather_facts: false
  tasks:
    - name: 00.01 - Cleanup configuration
      extreme.fe.extreme_fe_command:
        commands:
          - enable
          - terminal more disable
          - configure terminal
          - interface gigabitEthernet 1/20-1/23
          - auto-sense enable
          - interface gigabitEthernet 1/22
          - lacp key 1237
          - interface gigabitEthernet 1/20-1/23
          - no lacp enable
          - no lacp aggregation enable
          - interface gigabitEthernet 1/4-1/15
          - auto-sense enable
          - interface gigabitEthernet 1/15
          - default auto-sense wait-interval
          - auto-sense enable
          - interface gigabitEthernet 1/1,1/10
          - default poe poe-limit
          - default poe poe-priority
          - default poe fast-poe-enable
          - exit
          - no lacp enable
          - no mlt 10
          - no mlt 11
          - no mlt 15
          - no mlt 31
          - no mlt 32
          - no mlt 33
          - no mlt 34
          - no virtual-ist peer-ip
          - no vlan 100
          - no vlan 20
          - no vlan 5
          - no vlan 6
          - no vlan 2
          - no vlan 3
          - no vlan 4
          - no vlan 7
          - no vlan 8
          - no vlan 9
          - no vlan 10
          - no vlan 12
          - no vlan 202
          - no vlan 203
          - no vlan 204
          - no i-sid name 100
          - no i-sid name 202
          - no i-sid name 203
          - no i-sid name 204
          - router isis enable
        continue_on_failure: true
